<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주간보고</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #0f0f11; color: #e8e6e0; height: 100vh; overflow: hidden; }

  .app { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto 1fr auto; height: 100vh; }

  .topbar {
    grid-column: 1 / -1; display: flex; align-items: center;
    justify-content: space-between; padding: 14px 24px;
    border-bottom: 0.5px solid #2a2a2e;
  }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: #7c6af7; }
  .logo-text { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
  .week-badge { font-size: 11px; color: #888; background: #1e1e22; border: 0.5px solid #2a2a2e; border-radius: 20px; padding: 3px 10px; }
  .topbar-right { display: flex; gap: 8px; }

  .btn { border: 0.5px solid #2a2a2e; border-radius: 8px; padding: 7px 14px; font-size: 12px; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: all 0.15s; font-weight: 500; }
  .btn-ghost { background: transparent; color: #888; }
  .btn-ghost:hover { background: #1e1e22; color: #e8e6e0; }
  .btn-primary { background: #7c6af7; color: #fff; border-color: #7c6af7; }
  .btn-primary:hover { background: #6b5ae6; }

  .editor-panel { display: flex; flex-direction: column; border-right: 0.5px solid #2a2a2e; padding: 20px 24px; gap: 14px; overflow: hidden; }
  .panel-label { font-size: 11px; font-weight: 500; color: #555; letter-spacing: 0.08em; text-transform: uppercase; }

  .editor-area {
    flex: 1; background: #16161a; border: 0.5px solid #2a2a2e; border-radius: 10px;
    padding: 16px 18px; font-size: 14px; font-family: 'Noto Sans KR', sans-serif;
    color: #e8e6e0; resize: none; line-height: 1.8; outline: none; transition: border-color 0.15s;
  }
  .editor-area:focus { border-color: #3a3055; }
  .editor-area::placeholder { color: #3a3a42; }

  .action-row { display: flex; justify-content: space-between; align-items: center; }
  .char-count { font-size: 11px; color: #3a3a42; }

  .chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip { font-size: 11px; color: #555; background: #16161a; border: 0.5px solid #2a2a2e; border-radius: 20px; padding: 3px 10px; cursor: pointer; transition: all 0.12s; }
  .chip:hover { color: #e8e6e0; border-color: #3a3a55; }

  .preview-panel { display: flex; flex-direction: column; padding: 20px 24px; gap: 14px; overflow: hidden; }
  .slides-container { flex: 1; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; padding-right: 4px; }
  .slides-container::-webkit-scrollbar { width: 3px; }
  .slides-container::-webkit-scrollbar-thumb { background: #2a2a2e; border-radius: 10px; }

  .slide-card { background: #16161a; border: 0.5px solid #2a2a2e; border-radius: 10px; overflow: hidden; }
  .slide-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 0.5px solid #2a2a2e; }
  .slide-num { font-size: 10px; color: #555; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; }
  .slide-tag-select { background: transparent; border: none; font-size: 11px; color: #666; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; outline: none; }
  .slide-tag-select option { background: #16161a; }

  .slide-title-input {
    width: 100%; background: transparent; border: none; border-bottom: 0.5px solid #2a2a2e;
    padding: 10px 14px; font-size: 14px; font-weight: 600; color: #e8e6e0;
    font-family: 'Noto Sans KR', sans-serif; outline: none;
  }
  .slide-title-input::placeholder { color: #333; font-weight: 400; }
  .slide-body-input {
    width: 100%; background: transparent; border: none;
    padding: 10px 14px; font-size: 12px; color: #888; line-height: 1.7;
    font-family: 'Noto Sans KR', sans-serif; outline: none; resize: none; min-height: 64px;
  }
  .slide-body-input::placeholder { color: #2a2a2e; }

  .slide-actions { display: flex; justify-content: flex-end; padding: 6px 10px; gap: 6px; border-top: 0.5px solid #1a1a1e; }
  .slide-btn { background: transparent; border: none; font-size: 11px; color: #444; cursor: pointer; padding: 3px 8px; border-radius: 6px; font-family: 'Noto Sans KR', sans-serif; }
  .slide-btn:hover { color: #888; background: #1e1e22; }
  .slide-btn.danger:hover { color: #c07070; }

  .add-slide-btn {
    background: transparent; border: 0.5px dashed #2a2a2e; border-radius: 10px;
    padding: 10px; font-size: 12px; color: #444; cursor: pointer; width: 100%;
    font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s;
  }
  .add-slide-btn:hover { border-color: #3a3a55; color: #888; }

  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
  .empty-icon { font-size: 32px; filter: grayscale(1); opacity: 0.3; }
  .empty-text { font-size: 13px; color: #444; }

  .bottom-bar {
    grid-column: 1 / -1; display: flex; align-items: center; gap: 10px;
    padding: 12px 24px; border-top: 0.5px solid #2a2a2e;
  }

  .export-hint { font-size: 12px; color: #444; flex: 1; }
  .export-hint span { color: #7c6af7; }

  /* parse modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal-overlay.hidden { display: none; }
  .modal { background: #16161a; border: 0.5px solid #2a2a2e; border-radius: 14px; padding: 24px; width: 500px; max-width: 90vw; }
  .modal h2 { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
  .modal p { font-size: 12px; color: #666; margin-bottom: 14px; line-height: 1.6; }
  .modal textarea { width: 100%; background: #0f0f11; border: 0.5px solid #2a2a2e; border-radius: 8px; padding: 12px; font-size: 13px; font-family: 'Noto Sans KR', sans-serif; color: #e8e6e0; outline: none; resize: none; height: 160px; margin-bottom: 14px; line-height: 1.7; }
  .modal textarea:focus { border-color: #3a3055; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
</style>
</head>
<body>

<!-- 텍스트 파싱 모달 -->
<div class="modal-overlay hidden" id="parse-modal">
  <div class="modal">
    <h2>줄글로 슬라이드 만들기</h2>
    <p># 제목 으로 슬라이드를 나눠요. 제목 아래 내용을 쓰면 슬라이드 본문이 돼요.</p>
    <textarea id="parse-input" placeholder="# 채용&#10;채용 공고 3건 진행 중, 면접 일정 조율 중&#10;&#10;# ESG&#10;탄소배출 보고서 작성 완료&#10;&#10;# 이슈&#10;예산 초과 우려, 다음 주까지 해결 필요&#10;&#10;# 이번 주 계획&#10;발표 준비, 미팅 2건"></textarea>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeParseModal()">취소</button>
      <button class="btn btn-primary" onclick="parseText()">슬라이드 생성</button>
    </div>
  </div>
</div>

<div class="app">
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo-dot"></div>
      <span class="logo-text">주간보고</span>
      <span class="week-badge" id="week-badge"></span>
    </div>
    <div class="topbar-right">
      <button class="btn btn-ghost" onclick="clearAll()">초기화</button>
      <button class="btn btn-ghost" onclick="openParseModal()">줄글로 입력 ✦</button>
      <button class="btn btn-primary" onclick="exportToClaudeAI()">PPT 내보내기 →</button>
    </div>
  </div>

  <!-- EDITOR (메모 영역) -->
  <div class="editor-panel">
    <div class="panel-label">메모</div>
    <textarea class="editor-area" id="memo-input" placeholder="여기에 자유롭게 메모하세요.
나중에 슬라이드로 옮길 내용을 적어두는 공간이에요." oninput="updateCount()"></textarea>
    <div class="action-row">
      <span class="char-count" id="char-count">0자</span>
    </div>
    <div>
      <div class="panel-label" style="margin-bottom:8px;">자주 쓰는 표현</div>
      <div class="chips">
        <div class="chip" onclick="appendMemo('일정 이상 없음')">일정 이상 없음</div>
        <div class="chip" onclick="appendMemo('검토 예정')">검토 예정</div>
        <div class="chip" onclick="appendMemo('협의 중')">협의 중</div>
        <div class="chip" onclick="appendMemo('완료')">완료</div>
        <div class="chip" onclick="appendMemo('이슈 발생')">이슈 발생</div>
        <div class="chip" onclick="appendMemo('다음 주 진행')">다음 주 진행</div>
        <div class="chip" onclick="appendMemo('일정 조율 필요')">일정 조율 필요</div>
      </div>
    </div>
  </div>

  <!-- SLIDE EDITOR -->
  <div class="preview-panel">
    <div class="panel-label">슬라이드 편집</div>
    <div class="slides-container" id="slides-container">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">🗂️</div>
        <div class="empty-text">위에서 "줄글로 입력"하거나 슬라이드를 직접 추가하세요</div>
      </div>
    </div>
    <button class="add-slide-btn" onclick="addSlide()">+ 슬라이드 추가</button>
  </div>

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">
    <div class="export-hint">PPT 내보내기 → Claude.ai에 붙여넣고 <span>"PPT 파일 만들어줘"</span> 라고 하세요</div>
    <button class="btn btn-ghost" onclick="copyToClipboard()">내용 복사</button>
  </div>
</div>

<script>
  let slides = [];
  let slideCounter = 0;

  const TAG_LABELS = { summary: '요약', progress: '진행현황', issue: '이슈', plan: '계획' };

  function getWeekLabel() {
    const now = new Date();
    const month = now.getMonth() + 1;
    const day = now.getDate();
    const weekNum = Math.min(Math.ceil(day / 7), 5);
    const weeks = ['첫째', '둘째', '셋째', '넷째', '다섯째'];
    return `${now.getFullYear()}년 ${month}월 ${weeks[weekNum-1]} 주`;
  }
  document.getElementById('week-badge').textContent = getWeekLabel();

  function updateCount() {
    const len = document.getElementById('memo-input').value.length;
    document.getElementById('char-count').textContent = `${len}자`;
  }

  function appendMemo(text) {
    const input = document.getElementById('memo-input');
    if (input.value && !input.value.endsWith('\n')) input.value += ' ';
    input.value += text;
    updateCount();
    input.focus();
  }

  function openParseModal() { document.getElementById('parse-modal').classList.remove('hidden'); }
  function closeParseModal() { document.getElementById('parse-modal').classList.add('hidden'); }

  function parseText() {
    const text = document.getElementById('parse-input').value.trim();
    if (!text) return;
    let blocks = [];
    if (text.includes('#')) {
      const sections = text.split(/\n(?=#)/).map(b => b.trim()).filter(Boolean);
      sections.forEach(section => {
        const lines = section.split('\n').map(l => l.trim()).filter(Boolean);
        const title = lines[0].replace(/^#+\s*/, '');
        const body = lines.slice(1).join('\n');
        blocks.push({ title, body });
      });
    } else {
      blocks = text.split(/\n\s*\n/).map(b => b.trim()).filter(Boolean).map(block => {
        const lines = block.split('\n').map(l => l.trim()).filter(Boolean);
        return { title: lines[0], body: lines.slice(1).join('\n') };
      });
    }
    blocks.forEach((block, i) => {
      const { title: line, body } = block;
      let tag = 'progress';
      if (i === 0) tag = 'summary';
      else if (/이슈|문제|리스크|위험/.test(line)) tag = 'issue';
      else if (/계획|예정|다음 주|이번 주/.test(line)) tag = 'plan';
      addSlide(line, body, tag);
    });
    document.getElementById('parse-input').value = '';
    closeParseModal();
  }

  function addSlide(title = '', body = '', tag = 'progress') {
    const id = ++slideCounter;
    slides.push({ id, title, body, tag });
    renderSlides();
  }

  function removeSlide(id) {
    slides = slides.filter(s => s.id !== id);
    renderSlides();
  }

  function moveSlide(id, dir) {
    const idx = slides.findIndex(s => s.id === id);
    const newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= slides.length) return;
    [slides[idx], slides[newIdx]] = [slides[newIdx], slides[idx]];
    renderSlides();
  }

  function renderSlides() {
    const container = document.getElementById('slides-container');
    if (slides.length === 0) {
      container.innerHTML = `<div class="empty-state" id="empty-state"><div class="empty-icon">🗂️</div><div class="empty-text">위에서 "줄글로 입력"하거나 슬라이드를 직접 추가하세요</div></div>`;
      return;
    }
    container.innerHTML = slides.map((s, i) => `
      <div class="slide-card" id="card-${s.id}">
        <div class="slide-header">
          <span class="slide-num">슬라이드 ${i + 1}</span>
          <select class="slide-tag-select" onchange="updateTag(${s.id}, this.value)">
            ${Object.entries(TAG_LABELS).map(([v, l]) => `<option value="${v}" ${s.tag === v ? 'selected' : ''}>${l}</option>`).join('')}
          </select>
        </div>
        <input class="slide-title-input" placeholder="슬라이드 제목" value="${escHtml(s.title)}" oninput="updateField(${s.id}, 'title', this.value)" />
        <textarea class="slide-body-input" placeholder="슬라이드 내용 (선택)" oninput="updateField(${s.id}, 'body', this.value); autoResize(this)">${escHtml(s.body)}</textarea>
        <div class="slide-actions">
          ${i > 0 ? `<button class="slide-btn" onclick="moveSlide(${s.id}, -1)">↑ 위로</button>` : ''}
          ${i < slides.length - 1 ? `<button class="slide-btn" onclick="moveSlide(${s.id}, 1)">↓ 아래로</button>` : ''}
          <button class="slide-btn danger" onclick="removeSlide(${s.id})">삭제</button>
        </div>
      </div>
    `).join('');
    container.querySelectorAll('.slide-body-input').forEach(autoResize);
  }

  function escHtml(str) { return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function autoResize(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }
  function updateField(id, field, val) { const s = slides.find(s => s.id === id); if (s) s[field] = val; }
  function updateTag(id, val) { const s = slides.find(s => s.id === id); if (s) s.tag = val; }

  function clearAll() {
    slides = []; slideCounter = 0;
    document.getElementById('memo-input').value = '';
    updateCount();
    renderSlides();
  }

  function getExportText() {
    return slides.map((s, i) => `[슬라이드 ${i+1}] ${TAG_LABELS[s.tag]} — ${s.title}${s.body ? '\n' + s.body : ''}`).join('\n\n');
  }

  function copyToClipboard() {
    if (slides.length === 0) { alert('슬라이드가 없어요.'); return; }
    const text = `주간보고 PPT 자료 (${getWeekLabel()})\n\n` + getExportText() + '\n\n이 내용으로 PPT 파일 만들어줘';
    navigator.clipboard.writeText(text).then(() => alert('복사됐어요! Claude.ai에 붙여넣고 "PPT 파일 만들어줘"라고 하세요 😊'));
  }

  function exportToClaudeAI() {
    if (slides.length === 0) { alert('슬라이드를 먼저 만들어주세요.'); return; }
    copyToClipboard();
  }
</script>
</body>
</html>
